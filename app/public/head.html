<!-- CSS principale -->
<link rel="stylesheet" href="/style.css">

<!-- =========================================================
     PATCH HEAD-PLACEHOLDER
     Caricamento dinamico corretto per evitare errori HTML
========================================================= -->
<script>
  fetch("/head-extra.html")
    .then(r => r.text())
    .then(html => {
      const temp = document.createElement("div");
      temp.innerHTML = html;
      document.head.append(...temp.children);
    })
    .catch(() => {});
</script>

<!-- =========================================================
     TRACKING + UTM (caricati dopo head-extra)
========================================================= -->
<script src="/utm.js" defer></script>
<script src="/tracking.js" defer></script>
