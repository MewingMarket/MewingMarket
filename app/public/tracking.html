<!DOCTYPE html>
<html lang="it">
<head>
  <!-- Head dinamico condiviso -->
  <div id="head-placeholder"></div>
  <script>
    fetch("head.html")
      .then(r => r.text())
      .then(h => document.getElementById("head-placeholder").innerHTML = h);
  </script>

  <!-- SEO + Structured Data -->
  <script src="seo.js"></script>
  <script src="structured-data.js"></script>

  <!-- Stile globale -->
  <link rel="stylesheet" href="/style.css">
</head>

<body class="tracking-page">

<h1>MewingMarket – Tracking MAX</h1>
<p>Eventi raccolti da bot, sito, social, newsletter e store (solo sessione server, max 5000 eventi).</p>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" data-tab="overview">Overview</button>
  <button class="tab-btn" data-tab="vendite">Vendite</button>
  <button class="tab-btn" data-tab="prodotti">Prodotti</button>
  <button class="tab-btn" data-tab="social">Social</button>
  <button class="tab-btn" data-tab="bot">Bot</button>
  <button class="tab-btn" data-tab="eventi">Eventi grezzi</button>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <button id="btn-refresh">🔄 Aggiorna</button>
  <button class="secondary" id="btn-autorefresh">⏱️ Auto-refresh ON</button>
  <button class="secondary" onclick="location.reload()">♻️ Reload pagina</button>
</div>

<!-- Tab content -->
<div id="tab-content"></div>

<!-- Tracking JS -->
<script src="/tracking.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    TRACKING_UI.init();
  });
</script>

</body>
</html>
